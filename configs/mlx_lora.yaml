# QLoRA fine-tune for mlx_lm.lora (Apple Silicon). Run: mlx_lm.lora -c configs/mlx_lora.yaml
model: "mlx-community/Qwen2.5-3B-Instruct-4bit"
train: true
data: "./data"
fine_tune_type: "lora"
num_layers: 16
batch_size: 2
iters: 600
max_seq_length: 1024
learning_rate: 1e-4
steps_per_report: 10
steps_per_eval: 100
save_every: 200
grad_checkpoint: true
adapter_path: "./adapters/qwen3b-r16"
lora_parameters:
  rank: 16
  scale: 2.0
  dropout: 0.05
